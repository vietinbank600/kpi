<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KPI DASHBOARD</title>
<meta property="og:title" content="KPI DASHBOARD">
<meta property="og:description" content="CHƯƠNG TRÌNH KPI DASHBOARD THEO DÕI KẾT QUẢ ĐIỂM KPI">
<meta property="og:image" content="https://raw.githubusercontent.com/vietinbank600/kpi/3a8fcb5123d480bde1152212648f454bdcd41cae/thumb.png">
<meta property="og:image:secure_url" content="https://raw.githubusercontent.com/vietinbank600/kpi/3a8fcb5123d480bde1152212648f454bdcd41cae/thumb.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200" >
<meta property="og:image:height" content="630" >
<meta property="og:url" content="https://kpi.cn600.website/">
<meta property="og:type" content="website">
<meta property="og:site_name" content="KPI DASHBOARD">
<meta property="og:locale" content="vi_VN">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#060b16;
    --bg-2:#0b1730;
    --glass-fill: rgba(255,255,255,0.06);
    --glass-fill-strong: rgba(255,255,255,0.1);
    --glass-border: rgba(255,255,255,0.16);
    --glass-border-hi: rgba(255,255,255,0.45);
    --ink: #eef2fb;
    --ink-dim: rgba(238,242,251,0.62);
    --ink-faint: rgba(238,242,251,0.38);
    --accent-cyan: #5ee7ff;
    --accent-violet: #9b8bff;
    --accent-teal: #4fe3c1;
    --good: #4fe3a6;
    --warn: #ffcf6b;
    --bad: #ff7a8a;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{height:100%; overflow-x:hidden; width:100%;}
  body{
    margin:0;
    min-height:100vh;
    width:100%;
    font-family:'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 12% -8%, rgba(94,231,255,0.18), transparent 55%),
      radial-gradient(1000px 800px at 108% 15%, rgba(155,139,255,0.20), transparent 55%),
      radial-gradient(900px 700px at 50% 118%, rgba(79,227,193,0.14), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 60%, #0a1226 100%);
    overflow-x:hidden;
    position:relative;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  .kpi-table-wrap, .dept-table-wrap{ -webkit-overflow-scrolling:touch; }

  /* floating liquid blobs for ambient depth */
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    opacity:0.55;
    z-index:0;
    pointer-events:none;
    animation: drift 22s ease-in-out infinite;
  }
  .blob.b1{ width:420px; height:420px; top:-120px; left:-100px; background:radial-gradient(circle, rgba(94,231,255,0.5), transparent 70%); animation-duration:26s;}
  .blob.b2{ width:520px; height:520px; top:20%; right:-160px; background:radial-gradient(circle, rgba(155,139,255,0.45), transparent 70%); animation-duration:30s; animation-delay:-6s;}
  .blob.b3{ width:380px; height:380px; bottom:-140px; left:30%; background:radial-gradient(circle, rgba(79,227,193,0.4), transparent 70%); animation-duration:24s; animation-delay:-12s;}

  @keyframes drift{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-24px) scale(1.06); }
  }

  @media (prefers-reduced-motion: reduce){
    .blob{ animation:none; }
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:980px;
    margin:0 auto;
    padding:56px 24px 90px;
  }

  header.top{
    text-align:center;
    margin-bottom:40px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--accent-cyan);
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    padding:6px 14px;
    border-radius:999px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    margin-bottom:18px;
  }
  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--accent-cyan);
    box-shadow:0 0 8px var(--accent-cyan);
  }
  h1{
    font-size:clamp(28px,4.2vw,42px);
    font-weight:800;
    letter-spacing:-0.02em;
    margin:0 0 10px;
    background:linear-gradient(90deg,#ffffff, #cfe8ff 45%, #c9c2ff 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header.top p{
    color:var(--ink-dim);
    font-size:15px;
    margin:0;
    font-weight:500;
  }

  /* search glass panel */
  .search-panel{
    position:relative;
    z-index:30;
    margin:22px auto 8px;
    max-width:640px;
    border-radius:22px;
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
    padding:8px;
  }
  .search-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
  }
  .search-row svg{ flex:0 0 auto; opacity:0.6; }
  #searchInput{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    font-size:16px;
    font-weight:600;
    padding:10px 4px;
  }
  #searchInput::placeholder{ color:var(--ink-faint); font-weight:500; }
  #searchClear{
    flex:0 0 auto;
    display:none;
    align-items:center;
    justify-content:center;
    width:26px; height:26px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.10);
    color:var(--ink-dim);
    cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  #searchClear:hover{ background:rgba(255,255,255,0.20); color:var(--ink); }
  #searchClear.show{ display:flex; }

  .suggestions{
    position:absolute;
    left:8px; right:8px; top:calc(100% + 8px);
    background:rgba(10,18,38,0.85);
    border:1px solid var(--glass-border);
    border-radius:16px;
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    box-shadow:0 16px 40px rgba(0,0,0,0.5);
    max-height:320px;
    overflow-y:auto;
    z-index:20;
    display:none;
  }
  .suggestions.show{ display:block; }
  .sugg-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    cursor:pointer;
    border-bottom:1px solid rgba(255,255,255,0.06);
    transition: background .15s ease;
  }
  .sugg-item:last-child{ border-bottom:none; }
  .sugg-item:hover, .sugg-item.active{ background:rgba(94,231,255,0.10); }
  .sugg-name{ font-weight:700; font-size:14.5px; }
  .sugg-meta{ font-size:12px; color:var(--ink-faint); font-family:'JetBrains Mono',monospace; }
  .sugg-empty{ padding:16px; color:var(--ink-faint); font-size:13.5px; text-align:center; }

  .hint{
    text-align:center;
    font-size:12.5px;
    color:var(--ink-faint);
    margin-top:14px;
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.02em;
  }

  .toolbar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .tool-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Manrope', sans-serif;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    padding:9px 16px;
    border-radius:12px;
    cursor:pointer;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .tool-btn:hover{ background:var(--glass-fill-strong); border-color:var(--glass-border-hi); }
  .tool-btn:active{ transform: scale(0.97); }
  .struct-hint{
    width:100%;
    text-align:center;
    font-size:11px;
    color:var(--ink-faint);
    font-family:'JetBrains Mono', monospace;
    margin-top:2px;
  }

  .filter-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:14px;
  }
  .filter-toggle{
    display:inline-flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    user-select:none;
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    padding:8px 14px;
    border-radius:999px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: background .15s ease, border-color .15s ease;
  }
  .filter-toggle:hover{ background:var(--glass-fill-strong); border-color:var(--glass-border-hi); }
  .filter-toggle input{ display:none; }
  .toggle-track{
    position:relative;
    width:36px; height:20px;
    border-radius:999px;
    background:rgba(255,255,255,0.14);
    border:1px solid var(--glass-border);
    transition: background .2s ease, border-color .2s ease;
    flex:0 0 auto;
  }
  .toggle-thumb{
    position:absolute;
    top:1px; left:1px;
    width:16px; height:16px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);
    transition: transform .2s cubic-bezier(.2,.8,.2,1);
  }
  .filter-toggle input:checked + .toggle-track{
    background:linear-gradient(135deg, var(--bad), #ff5f77);
    border-color:rgba(255,122,138,0.5);
  }
  .filter-toggle input:checked + .toggle-track .toggle-thumb{
    transform: translateX(16px);
  }
  .toggle-label{
    font-size:13px;
    font-weight:700;
    color:var(--ink-dim);
  }
  .filter-toggle input:checked ~ .toggle-label{ color:var(--ink); }
  .filter-badge{
    display:none;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    font-weight:700;
    color:var(--bad);
    background:rgba(255,122,138,0.12);
    border:1px solid rgba(255,122,138,0.3);
    padding:4px 12px;
    border-radius:999px;
  }
  .filter-badge.show{ display:inline-flex; }

  /* ==== DEPARTMENT / KPI FILTER PANEL ==== */
  .dept-panel{
    position:relative;
    margin:22px auto 0;
    max-width:820px;
    border-radius:22px;
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
    padding:20px 22px 22px;
  }
  .dept-head{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    font-weight:800;
    color:var(--ink);
    margin-bottom:14px;
  }
  .dept-head .sub{
    font-weight:500;
    font-size:12px;
    color:var(--ink-faint);
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
  }
  .dept-controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .dept-controls select{
    flex:1 1 220px;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--glass-border);
    color:var(--ink);
    font-family:'Manrope', sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:11px 14px;
    border-radius:12px;
    outline:none;
    cursor:pointer;
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23eef2fb' stroke-width='2'><polyline points='6 9 12 15 18 9'></polyline></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
    padding-right:34px;
  }
  .dept-controls select:hover{ border-color:var(--glass-border-hi); }
  .dept-controls select option{ background:#0b1730; color:var(--ink); }
  .dept-clear{
    flex:0 0 auto;
    background:transparent;
    border:1px solid var(--glass-border);
    color:var(--ink-dim);
    font-size:12.5px;
    font-weight:700;
    padding:0 16px;
    border-radius:12px;
    cursor:pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .dept-clear:hover{ background:var(--glass-fill-strong); border-color:var(--glass-border-hi); }

  #deptResult{ margin-top:16px; }
  .dept-empty{
    text-align:center;
    padding:22px 10px 6px;
    color:var(--ink-faint);
    font-size:13px;
  }
  .dept-summary{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
  }
  .dept-stat{
    flex:1 1 140px;
    background:var(--glass-fill-strong);
    border:1px solid var(--glass-border);
    border-radius:14px;
    padding:12px 14px;
  }
  .dept-stat .val{
    font-family:'JetBrains Mono', monospace;
    font-size:19px;
    font-weight:700;
  }
  .dept-stat .lbl{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-faint);
    margin-top:4px;
    font-weight:600;
  }
  .dept-table-wrap{ overflow-x:auto; border-radius:16px; border:1px solid rgba(255,255,255,0.08); }
  table.dept-table{ width:100%; border-collapse:separate; border-spacing:0; min-width:560px; }
  table.dept-table thead th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--ink-faint);
    font-weight:700;
    padding:11px 14px;
    background:rgba(255,255,255,0.05);
  }
  table.dept-table thead th.num, table.dept-table td.num{ text-align:right; }
  table.dept-table tbody tr{ cursor:pointer; transition: background .15s ease; }
  table.dept-table tbody tr:hover{ background:rgba(94,231,255,0.08); }
  table.dept-table td{
    padding:11px 14px;
    font-size:13px;
    border-top:1px solid rgba(255,255,255,0.07);
  }
  table.dept-table td.name-cell{ font-weight:700; }
  table.dept-table td.role-cell{ color:var(--ink-faint); font-size:11.5px; }

  .toast{
    position:fixed;
    top:22px; left:50%;
    transform:translateX(-50%) translateY(-140%);
    z-index:100;
    display:flex;
    align-items:center;
    gap:10px;
    padding:13px 20px;
    border-radius:14px;
    background:rgba(10,18,38,0.85);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    box-shadow:0 16px 40px rgba(0,0,0,0.5);
    font-size:13.5px;
    font-weight:600;
    transition: transform .35s cubic-bezier(.2,.8,.2,1);
    max-width:90vw;
  }
  .toast.show{ transform:translateX(-50%) translateY(0); }
  .toast.error{ border-color:rgba(255,122,138,0.4); }
  .toast.error .toast-dot{ background:var(--bad); box-shadow:0 0 8px var(--bad); }
  .toast-dot{
    width:8px; height:8px; border-radius:50%; flex:0 0 auto;
    background:var(--good); box-shadow:0 0 8px var(--good);
  }

  /* ==== CARD ==== */
  #cardZone{ margin-top:44px; }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-faint);
  }
  .empty-state svg{ opacity:0.35; margin-bottom:14px; }
  .empty-state div{ font-size:14px; }

  .glass-card{
    position:relative;
    border-radius:28px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03) 40%, rgba(255,255,255,0.06)),
      var(--glass-fill);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(26px) saturate(160%);
    -webkit-backdrop-filter: blur(26px) saturate(160%);
    box-shadow:
      0 24px 60px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 0 rgba(255,255,255,0.04);
    overflow:hidden;
    animation: cardIn .5s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes cardIn{
    from{ opacity:0; transform: translateY(14px) scale(.985); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }
  .glass-card::before{
    /* specular sheen sweep, the "liquid glass" highlight */
    content:"";
    position:absolute;
    top:-60%; left:-30%;
    width:60%; height:220%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,0.16), transparent);
    transform:rotate(12deg);
    pointer-events:none;
  }

  .card-head{
    position:relative;
    display:flex;
    align-items:center;
    gap:18px;
    padding:28px 30px;
    border-bottom:1px solid rgba(255,255,255,0.10);
  }
  .avatar{
    flex:0 0 auto;
    width:64px; height:64px;
    border-radius:20px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800;
    color:#0a1226;
    background:linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
    box-shadow:0 8px 20px rgba(94,231,255,0.25), inset 0 1px 0 rgba(255,255,255,0.5);
    overflow:hidden;
  }
  .avatar img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .id-block{ flex:1; min-width:0; }
  .id-name{
    font-size:22px; font-weight:800; color: rgba(9, 201, 239, 0.968); letter-spacing:-0.01em;
    margin:0 0 4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .id-role{
    font-size:13.5px; color:var(--ink-dim); font-weight:600;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .id-role .sep{ opacity:.4; }
  .id-role .tag{
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    padding:3px 10px 3px 8px;
    border-radius:999px;
    font-size:12px;
  }

  .score-chip{
    flex:0 0 auto;
    text-align:center;
    padding:12px 18px;
    border-radius:18px;
    background:var(--glass-fill-strong);
    border:1px solid var(--glass-border);
    min-width:104px;
  }
  .score-chip .val{
    font-family:'JetBrains Mono', monospace;
    font-size:24px; font-weight:700; line-height:1;
  }
  .score-chip .lbl{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--ink-faint); margin-top:6px; font-weight:600;
  }

  .card-body{ padding:10px 14px 24px; }

  .table-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px 8px;
    gap:12px;
  }

  .collapse-toggle-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:'Manrope', sans-serif;
    font-size:12.5px;
    font-weight:600;
    color:var(--accent-cyan);
    background:var(--glass-fill);
    border:1px solid var(--glass-border);
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: all .2s ease;
    white-space:nowrap;
  }

  .collapse-toggle-btn:hover{
    background:var(--glass-fill-strong);
    border-color:var(--glass-border-hi);
  }

  .collapse-toggle-btn:active{
    transform: scale(0.97);
  }

  .collapse-toggle-btn svg{
    width:14px;
    height:14px;
    transition: transform .3s ease;
  }

  .collapse-toggle-btn.collapsed svg{
    transform: rotate(-90deg);
  }

  .kpi-table-wrap{ 
    overflow-x:auto;
    overflow-y:hidden;
    transition: max-height .3s ease, opacity .3s ease, visibility .3s ease;
    max-height:8000px;
    opacity:1;
    visibility:visible;
  }

  .kpi-table-wrap.collapsed{
    max-height:0;
    opacity:0;
    visibility:hidden;
  }
  table.kpi-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    min-width:640px;
  }
  table.kpi-table thead th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:var(--ink-faint);
    font-weight:700;
    padding:12px 16px;
    position:sticky; top:0;
  }
  table.kpi-table thead th.num, table.kpi-table td.num{ text-align:right; }
  table.kpi-table tbody tr{
    transition: background .15s ease;
  }
  table.kpi-table tbody tr:hover{ background:rgba(255,255,255,0.045); }
  table.kpi-table td{
    padding:13px 16px;
    font-size:13.5px;
    border-top:1px solid rgba(255,255,255,0.07);
  }
  table.kpi-table td.kpi-name{
    max-width:340px;
    color:var(--ink);
    font-weight:600;
    line-height:1.35;
  }
  td.num, th.num{ font-family:'JetBrains Mono', monospace; }
  td.mono{ font-family:'JetBrains Mono', monospace; color:var(--ink-dim); }

  .ratio-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:4px 10px;
    border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:12.5px;
    border:1px solid transparent;
  }
  .ratio-pill.good{ color:var(--good); background:rgba(79,227,166,0.12); border-color:rgba(79,227,166,0.3); }
  .ratio-pill.warn{ color:var(--warn); background:rgba(255,207,107,0.12); border-color:rgba(255,207,107,0.3); }
  .ratio-pill.bad{ color:var(--bad); background:rgba(255,122,138,0.12); border-color:rgba(255,122,138,0.3); }

  .bar-track{
    position:relative;
    width:64px; height:5px;
    border-radius:99px;
    background:rgba(255,255,255,0.10);
    overflow:hidden;
  }
  .bar-fill{
    position:absolute; left:0; top:0; bottom:0;
    border-radius:99px;
  }

  .card-foot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    padding:16px 30px 24px;
    color:var(--ink-faint);
    font-size:11.5px;
    font-family:'JetBrains Mono', monospace;
    flex-wrap:wrap;
  }

  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.15); border-radius:8px; }

  @media (max-width:640px){
    .card-head{ flex-wrap:wrap; }
    .score-chip{ order:3; width:100%; }
  }

  /* ==== TỐI ƯU CHO MÀN HÌNH ĐIỆN THOẠI ==== */
  @media (max-width:600px){
    .wrap{ padding:28px 14px 60px; }
    .eyebrow{ font-size:11px; padding:5px 10px; letter-spacing:0.1em; }
    header.top{ margin-bottom:26px; }
    header.top p{ font-size:13px; }

    .search-panel{ margin:16px auto 8px; border-radius:18px; }
    #searchInput{ font-size:15px; padding:8px 4px; }

    .filter-row{ flex-wrap:wrap; gap:8px; }
    .toggle-label{ font-size:12px; }

    .dept-panel{ padding:16px 14px 18px; border-radius:18px; }
    .dept-controls{ flex-direction:column; }
    .dept-controls select{ flex:1 1 auto; width:100%; }
    .dept-clear{ width:100%; padding:10px; }
    .dept-summary{ gap:8px; }
    .dept-stat{ flex:1 1 46%; padding:10px 12px; }

    .toolbar{ gap:8px; }
    .tool-btn{ font-size:12px; padding:9px 12px; }
    .struct-hint{ font-size:10px; }

    #cardZone{ margin-top:28px; }
    .card-head{ padding:20px 16px; gap:12px; }
    .avatar{ width:52px; height:52px; border-radius:16px; font-size:19px; }
    .id-name{ font-size:18px; }
    .id-role .tag{ font-size:11px; padding:3px 8px 3px 7px; }
    .score-chip{ padding:10px 14px; min-width:0; }
    .score-chip .val{ font-size:20px; }

    .card-body{ padding:6px 4px 18px; }
    table.kpi-table td, table.kpi-table thead th{ padding:10px 12px; font-size:12.5px; }
    .card-foot{ padding:14px 16px 20px; font-size:10.5px; gap:8px; }

    /* Chuyển 2 bảng sang dạng "thẻ" xếp dọc để không cần kéo ngang */
    .kpi-table-wrap, .dept-table-wrap{ overflow-x:visible; }

    table.kpi-table, table.dept-table{ min-width:0; width:100%; }
    table.kpi-table thead, table.dept-table thead{ display:none; }
    table.kpi-table tbody, table.dept-table tbody,
    table.kpi-table tr, table.dept-table tr,
    table.kpi-table td, table.dept-table td{ display:block; width:100%; }

    table.kpi-table tr, table.dept-table tr{
      padding:14px 4px 12px;
      border-top:1px solid rgba(255,255,255,0.08);
    }
    table.kpi-table tr:first-child, table.dept-table tr:first-child{ border-top:none; }

    table.kpi-table td, table.dept-table td{
      border-top:none !important;
      padding:7px 4px !important;
    }
    table.kpi-table td.kpi-name{
      font-size:16px;
      font-weight:700;
      margin-bottom:6px;
    }
    table.dept-table td.name-cell{
      font-size:16px;
      margin-bottom:6px;
    }
    table.kpi-table td.num,
    table.dept-table td.num{
      display:flex !important;
      align-items:center;
      justify-content:space-between;
      text-align:left;
      font-size:16px;
      font-weight:700;
    }
    table.kpi-table td.num::before,
    table.dept-table td.num::before{
      content: attr(data-label);
      color:var(--ink-faint);
      font-family:'Manrope', sans-serif;
      font-weight:600;
      font-size:14px;
    }
    table.kpi-table .ratio-pill{ font-size:14px; padding:5px 12px; }
    table.kpi-table .bar-track{ width:48px; }
  }

  @media (max-width:600px){
    .toast{ left:12px; right:12px; transform:translateY(-140%); max-width:calc(100vw - 24px); }
    .toast.show{ transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="wrap">
  <header class="top">
    <div class="eyebrow"><span class="dot"></span> VietinBank · Chi nhánh Bình Thuận <span class="dot"></span></div>
    <h1>KPI DASHBOARD</h1>
    <p style="color: red;">Kết quả KPI 6 tháng đầu năm 2026</p>
  </header>

  <div class="filter-row">
    <label class="filter-toggle">
      <input type="checkbox" id="lowRatioToggle">
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">Chỉ hiện chỉ tiêu tỷ lệ &lt; 80%</span>
    </label>
    <span class="filter-badge" id="filterBadge"></span>
  </div>

  <div class="search-panel">

    <div class="search-row">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="searchInput" type="text" placeholder="Nhập tên cán bộ, ví dụ: Bùi Thị Ngoan..." autocomplete="off">
      <button id="searchClear" type="button" title="Xoá" aria-label="Xoá tìm kiếm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="hint" id="countHint"></div>

  <div id="cardZone">
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="3"></rect><path d="M7 9h10M7 13h6"></path></svg>
      <div>Chưa có cán bộ nào được chọn. Hãy tìm kiếm ở ô phía trên.</div>
    </div>
  </div>

  <div class="dept-panel">
    <div class="dept-head">🏢 Lọc theo phòng &amp; chỉ tiêu KPI<span class="sub" id="deptSub"></span></div>
    <div class="dept-controls">
      <select id="deptSelect"><option value="">-- Tất cả phòng --</option></select>
      <select id="cvSelect"><option value="">-- Tất cả công việc --</option></select>
      <select id="kpiSelect"><option value="">-- Chọn chỉ tiêu KPI --</option></select>
      <button class="dept-clear" id="deptClear" type="button">Xóa lọc</button>
    </div>
    <div id="deptResult"></div>
  </div>

    <div class="toolbar">
    <button class="tool-btn" id="importBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      Nhập dữ liệu từ Excel
    </button>
    <button class="tool-btn" id="exportBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      Xuất data.js
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <span class="struct-hint">Cột bắt buộc: phong, ten, cong_viec, kpi, trong_so, ke_hoach, thuc_hien, ty_le (ty_le có thể để trống)</span>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-dot"></span><span id="toastMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="data.js"></script>
<script>
  // ---- khôi phục dữ liệu đã nhập từ lần trước (nếu trình duyệt hỗ trợ lưu cục bộ) ----
  try{
    const saved = localStorage.getItem('kpi_data_override');
    if(saved) KPI_DATA = JSON.parse(saved);
  }catch(e){ /* môi trường không hỗ trợ lưu cục bộ - bỏ qua, dùng data.js gốc */ }

  let ALL_NAMES = Object.keys(KPI_DATA).sort((a,b)=>a.localeCompare(b,'vi'));

  // ================= DEPARTMENT / JOB / KPI FILTER =================
  const deptSelect = document.getElementById('deptSelect');
  const cvSelect = document.getElementById('cvSelect');
  const kpiSelect = document.getElementById('kpiSelect');
  const deptClear = document.getElementById('deptClear');
  const deptResult = document.getElementById('deptResult');
  const deptSub = document.getElementById('deptSub');

  function populateDeptFilters(){
    const depts = [...new Set(ALL_NAMES.map(n => KPI_DATA[n].phong).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'vi'));
    const congViecs = [...new Set(ALL_NAMES.map(n => KPI_DATA[n].cong_viec).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'vi'));
    const kpiNames = [...new Set(ALL_NAMES.flatMap(n => KPI_DATA[n].kpis.map(k => k.kpi)))].sort((a,b)=>a.localeCompare(b,'vi'));
    deptSelect.innerHTML = '<option value="">-- Tất cả phòng --</option>' +
      depts.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
    cvSelect.innerHTML = '<option value="">-- Tất cả công việc --</option>' +
      congViecs.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    kpiSelect.innerHTML = '<option value="">-- Chọn chỉ tiêu KPI --</option>' +
      kpiNames.map(k => `<option value="${escapeHtml(k)}">${escapeHtml(k)}</option>`).join('');
  }
  populateDeptFilters();

  deptSelect.addEventListener('change', renderDeptReport);
  cvSelect.addEventListener('change', renderDeptReport);
  kpiSelect.addEventListener('change', renderDeptReport);
  deptClear.addEventListener('click', () => {
    deptSelect.value = '';
    cvSelect.value = '';
    kpiSelect.value = '';
    renderDeptReport();
  });

  function renderDeptReport(){
    const dept = deptSelect.value;
    const congViec = cvSelect.value;
    const kpiName = kpiSelect.value;
    deptSub.textContent = '';

    // chưa chọn gì -> ẩn kết quả
    if(!dept && !congViec && !kpiName){
      deptResult.innerHTML = '';
      return;
    }

    const namesInDept = ALL_NAMES.filter(n => {
      const d = KPI_DATA[n];
      return (!dept || d.phong === dept) && (!congViec || d.cong_viec === congViec);
    });

    const scopeLabel = [dept, congViec].filter(Boolean).map(escapeHtml).join(' · ');

    // Chưa chọn KPI -> hiển thị bảng tổng điểm KPI của nhóm đã lọc
    if(!kpiName){
      if(namesInDept.length === 0){
        deptResult.innerHTML = `<div class="dept-empty">Không có cán bộ nào phù hợp bộ lọc.</div>`;
        return;
      }
      deptSub.textContent = `${namesInDept.length} cán bộ`;
      const rows = namesInDept
        .slice()
        .sort((a,b) => KPI_DATA[b].diem_binh_quan - KPI_DATA[a].diem_binh_quan)
        .map(n => {
          const d = KPI_DATA[n];
          const diemKpiRow = d.kpis.find(k => k.kpi.trim().toLowerCase() === 'điểm kpi');
          const overall = diemKpiRow ? diemKpiRow.thuc_hien.toFixed(2) : (d.diem_binh_quan * 100).toFixed(2);
          return `<tr data-name="${escapeHtml(n)}">
            <td class="name-cell">${escapeHtml(n)}<div class="role-cell">${escapeHtml(d.phong)} · ${escapeHtml(d.cong_viec)}</div></td>
            <td class="num mono" data-label="Tổng điểm KPI">${overall}</td>
          </tr>`;
        }).join('');
      deptResult.innerHTML = `
        <div class="dept-table-wrap">
          <table class="dept-table">
            <thead><tr><th>Cán bộ${scopeLabel ? ' — ' + scopeLabel : ''}</th><th class="num">Tổng điểm KPI</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
      bindDeptRowClicks();
      return;
    }

    // Đã chọn KPI (có thể kèm phòng / công việc) -> liệt kê từng cán bộ với chỉ tiêu đó
    const matched = [];
    namesInDept.forEach(n => {
      const d = KPI_DATA[n];
      const row = d.kpis.find(k => k.kpi === kpiName);
      if(row) matched.push({ name: n, phong: d.phong, cong_viec: d.cong_viec, ...row });
    });

    if(matched.length === 0){
      deptResult.innerHTML = `<div class="dept-empty">Không có cán bộ nào${scopeLabel ? ' thuộc "' + scopeLabel + '"' : ''} có chỉ tiêu "${escapeHtml(kpiName)}".</div>`;
      return;
    }

    matched.sort((a,b) => b.ty_le - a.ty_le);
    const tongKeHoach = matched.reduce((s,r) => s + r.ke_hoach, 0);
    const tongThucHien = matched.reduce((s,r) => s + r.thuc_hien, 0);
    const tyLeTong = tongKeHoach ? tongThucHien / tongKeHoach : 0;

    deptSub.textContent = `${matched.length} cán bộ`;

    const rows = matched.map(r => `
      <tr data-name="${escapeHtml(r.name)}">
        <td class="name-cell">${escapeHtml(r.name)}<div class="role-cell">${escapeHtml(r.phong)} · ${escapeHtml(r.cong_viec)}</div></td>
        <td class="num mono" data-label="Kế hoạch">${fmtNum(r.ke_hoach)}</td>
        <td class="num mono" data-label="Thực hiện">${fmtNum(r.thuc_hien)}</td>
        <td class="num" data-label="Tỷ lệ HT"><span class="ratio-pill ${ratioClass(r.ty_le)}">${(r.ty_le*100).toFixed(2)}%</span></td>
      </tr>`).join('');

    deptResult.innerHTML = `
      <div class="dept-summary">
        <div class="dept-stat"><div class="val">${matched.length}</div><div class="lbl">Cán bộ</div></div>
        <div class="dept-stat"><div class="val mono">${fmtNum(tongKeHoach)}</div><div class="lbl">Tổng kế hoạch</div></div>
        <div class="dept-stat"><div class="val mono">${fmtNum(tongThucHien)}</div><div class="lbl">Tổng thực hiện</div></div>
        <div class="dept-stat"><div class="val" style="color:${ratioColor(tyLeTong)}">${(tyLeTong*100).toFixed(2)}%</div><div class="lbl">Tỷ lệ hoàn thành chung</div></div>
      </div>
      <div class="dept-table-wrap">
        <table class="dept-table">
          <thead>
            <tr>
              <th>Cán bộ${scopeLabel ? ' — ' + scopeLabel : ''}</th>
              <th class="num">Kế hoạch</th>
              <th class="num">Thực hiện</th>
              <th class="num">Tỷ lệ HT</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    bindDeptRowClicks();
  }

  function bindDeptRowClicks(){
    deptResult.querySelectorAll('table.dept-table tbody tr').forEach(tr => {
      tr.addEventListener('click', () => {
        const name = tr.dataset.name;
        if(!name) return;
        input.value = name;
        selectName(name);
        document.getElementById('cardZone').scrollIntoView({behavior:'smooth', block:'start'});
      });
    });
  }

  const input = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const suggBox = document.getElementById('suggestions');
  const cardZone = document.getElementById('cardZone');
  const countHint = document.getElementById('countHint');
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  refreshCount();

  function refreshCount(){
    countHint.textContent = `${ALL_NAMES.length} cán bộ trong cơ sở dữ liệu`;
  }

  function showToast(msg, isError){
    toastMsg.textContent = msg;
    toast.classList.toggle('error', !!isError);
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove('show'), isError ? 5000 : 3200);
  }

  function stripDiacritics(str){
    return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase();
  }

  let activeIndex = -1;
  let currentMatches = [];

  function renderSuggestions(query){
    const q = stripDiacritics(query.trim());
    if(!q){ suggBox.classList.remove('show'); suggBox.innerHTML=''; return; }
    currentMatches = ALL_NAMES.filter(n => stripDiacritics(n).includes(q)).slice(0,30);
    activeIndex = -1;
    if(currentMatches.length === 0){
      suggBox.innerHTML = `<div class="sugg-empty">Không tìm thấy cán bộ phù hợp</div>`;
      suggBox.classList.add('show');
      return;
    }
    suggBox.innerHTML = currentMatches.map((name,i) => {
      const d = KPI_DATA[name];
      return `<div class="sugg-item" data-idx="${i}" data-name="${escapeHtml(name)}">
        <span class="sugg-name">${escapeHtml(name)}</span>
        <span class="sugg-meta">${escapeHtml(d.phong)}</span>
      </div>`;
    }).join('');
    suggBox.classList.add('show');
  }

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toggleClearBtn(){
    searchClear.classList.toggle('show', !!input.value.trim());
  }

  input.addEventListener('input', (e) => { renderSuggestions(e.target.value); toggleClearBtn(); });
  input.addEventListener('focus', (e) => { if(e.target.value.trim()) renderSuggestions(e.target.value); });
  toggleClearBtn();

  searchClear.addEventListener('click', () => {
    input.value = '';
    suggBox.classList.remove('show');
    suggBox.innerHTML = '';
    toggleClearBtn();
    input.focus();
  });

  document.addEventListener('click', (e) => {
    if(!e.target.closest('.search-panel')) suggBox.classList.remove('show');
  });

  suggBox.addEventListener('click', (e) => {
    const item = e.target.closest('.sugg-item');
    if(!item || !item.dataset.name) return;
    selectName(item.dataset.name);
  });

  input.addEventListener('keydown', (e) => {
    const items = Array.from(suggBox.querySelectorAll('.sugg-item'));
    if(!items.length) return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = Math.min(activeIndex+1, items.length-1);
      updateActive(items);
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = Math.max(activeIndex-1, 0);
      updateActive(items);
    } else if(e.key === 'Enter'){
      e.preventDefault();
      if(activeIndex >= 0 && items[activeIndex]) selectName(items[activeIndex].dataset.name);
      else if(currentMatches.length === 1) selectName(currentMatches[0]);
    } else if(e.key === 'Escape'){
      suggBox.classList.remove('show');
    }
  });

  function updateActive(items){
    items.forEach(el => el.classList.remove('active'));
    if(items[activeIndex]){
      items[activeIndex].classList.add('active');
      items[activeIndex].scrollIntoView({block:'nearest'});
    }
  }

  function selectName(name){
    input.value = name;
    toggleClearBtn();
    suggBox.classList.remove('show');
    currentName = name;
    renderCard(name);
  }

  // ================= FILTER: chỉ hiện chỉ tiêu tỷ lệ < 80% =================
  let currentName = null;
  let lowRatioOnly = false;
  const lowRatioToggle = document.getElementById('lowRatioToggle');
  const filterBadge = document.getElementById('filterBadge');

  lowRatioToggle.addEventListener('change', (e) => {
    lowRatioOnly = e.target.checked;
    if(currentName) renderCard(currentName);
  });

  // ================= IMPORT / EXPORT EXCEL =================
  const REQUIRED_COLS = ['phong','ten','cong_viec','kpi','trong_so','ke_hoach','thuc_hien','ty_le'];
  const importBtn = document.getElementById('importBtn');
  const exportBtn = document.getElementById('exportBtn');
  const fileInput = document.getElementById('fileInput');

  importBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    fileInput.value = '';
    if(!file) return;
    try{
      const grouped = await parseExcelFile(file);
      const count = Object.keys(grouped).length;
      if(count === 0) throw new Error('Không đọc được dòng dữ liệu nào hợp lệ.');
      KPI_DATA = grouped;
      ALL_NAMES = Object.keys(KPI_DATA).sort((a,b)=>a.localeCompare(b,'vi'));
      refreshCount();
      populateDeptFilters();
      deptSelect.value = ''; cvSelect.value = ''; kpiSelect.value = '';
      renderDeptReport();
      input.value = '';
      currentName = null;
      filterBadge.classList.remove('show');
      cardZone.innerHTML = `<div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="3"></rect><path d="M7 9h10M7 13h6"></path></svg>
          <div>Đã nhập ${count} cán bộ. Hãy tìm kiếm ở ô phía trên.</div>
        </div>`;
      try{ localStorage.setItem('kpi_data_override', JSON.stringify(KPI_DATA)); }catch(e){}
      showToast(`Đã nhập thành công ${count} cán bộ từ Excel (lưu tạm trong trình duyệt này).`);
    }catch(err){
      showToast('Lỗi nhập file: ' + err.message, true);
    }
  });

  function parseExcelFile(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('Không đọc được file.'));
      reader.onload = (ev) => {
        try{
          const wb = XLSX.read(ev.target.result, {type:'array'});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, {defval:null, raw:true});
          if(!rows.length) throw new Error('File không có dữ liệu.');

          const headers = Object.keys(rows[0]).map(h => String(h).trim());
          const missing = REQUIRED_COLS.filter(c => !headers.includes(c));
          if(missing.length) throw new Error('Thiếu cột: ' + missing.join(', ') + '. Cần đủ 8 cột: ' + REQUIRED_COLS.join(', '));

          const grouped = {};
          rows.forEach(r => {
            const ten = String(r.ten ?? '').trim();
            if(!ten) return;
            const phong = String(r.phong ?? '').trim();
            const cong_viec = String(r.cong_viec ?? '').trim();
            const kpi = String(r.kpi ?? '').trim();
            if(!kpi) return;
            const trong_so = Number(r.trong_so) || 0;
            const ke_hoach = Number(r.ke_hoach) || 0;
            const thuc_hien = (r.thuc_hien === null || r.thuc_hien === '') ? 0 : (Number(r.thuc_hien) || 0);
            let ty_le = (r.ty_le === null || r.ty_le === '') ? NaN : Number(r.ty_le);
            if(isNaN(ty_le)) ty_le = ke_hoach ? thuc_hien / ke_hoach : 0;

            if(!grouped[ten]) grouped[ten] = { phong, cong_viec, kpis: [] };
            grouped[ten].kpis.push({ kpi, trong_so, ke_hoach, thuc_hien, ty_le });
          });

          Object.keys(grouped).forEach(name => {
            const d = grouped[name];
            let tw = 0, ws = 0;
            d.kpis.forEach(k => { tw += k.trong_so; ws += k.trong_so * k.ty_le; });
            d.diem_binh_quan = tw ? +(ws / tw).toFixed(3) : 0;
            d.tong_trong_so = tw;
          });

          resolve(grouped);
        }catch(err){
          reject(err);
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  exportBtn.addEventListener('click', () => {
    if(!ALL_NAMES.length){ showToast('Chưa có dữ liệu để xuất.', true); return; }
    const content = 'let KPI_DATA = ' + JSON.stringify(KPI_DATA) + ';';
    const blob = new Blob([content], {type:'text/javascript;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'data.js';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Đã tải data.js — thay thế file cũ trong thư mục để lưu vĩnh viễn.');
  });


  function ratioClass(v){
    if(v >= 1) return 'good';
    if(v >= 0.85) return 'warn';
    return 'bad';
  }
  function ratioColor(v){
    if(v >= 1) return 'var(--good)';
    if(v >= 0.85) return 'var(--warn)';
    return 'var(--bad)';
  }
  function fmtNum(n){
    return Number(n).toLocaleString('vi-VN', {maximumFractionDigits:2});
  }
  function initials(name){
    const parts = name.trim().split(/\s+/);
    const last = parts[parts.length-1] || '';
    return (last[0]||'?').toUpperCase();
  }

  function renderCard(name){
    const d = KPI_DATA[name];
    if(!d){
      cardZone.innerHTML = `<div class="empty-state"><div>Không tìm thấy dữ liệu cho "${escapeHtml(name)}"</div></div>`;
      return;
    }
    const diemKpiRow = d.kpis.find(k => k.kpi.trim().toLowerCase() === 'điểm kpi');
    const overallColorFraction = diemKpiRow ? diemKpiRow.thuc_hien / 100 : d.diem_binh_quan;
    const overallDisplay = diemKpiRow ? diemKpiRow.thuc_hien.toFixed(2) : (d.diem_binh_quan * 100).toFixed(2);
    const overallIsFromRow = !!diemKpiRow;

    const displayKpis = lowRatioOnly ? d.kpis.filter(k => k.ty_le < 0.8) : d.kpis;
    filterBadge.classList.toggle('show', lowRatioOnly);
    filterBadge.textContent = lowRatioOnly ? `⚠ ${displayKpis.length}/${d.kpis.length} chỉ tiêu dưới 80%` : '';

    const rows = displayKpis.length ? displayKpis.map(k => {
      const pct = Math.max(0, Math.min(150, k.ty_le*100));
      return `
      <tr>
        <td class="kpi-name">${escapeHtml(k.kpi)}</td>
        <td class="num mono" data-label="Trọng số">${fmtNum(k.trong_so)}</td>
        <td class="num mono" data-label="Kế hoạch">${fmtNum(k.ke_hoach)}</td>
        <td class="num mono" data-label="Thực hiện">${fmtNum(k.thuc_hien)}</td>
        <td class="num" data-label="Tỷ lệ HT">
          <div style="display:flex; align-items:center; gap:10px; justify-content:flex-end;">
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,pct)}%; background:${ratioColor(k.ty_le)}"></div></div>
            <span class="ratio-pill ${ratioClass(k.ty_le)}">${(k.ty_le*100).toFixed(2)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('') : `<tr><td colspan="5" style="text-align:center; padding:28px; color:var(--ink-faint);">Không có chỉ tiêu nào dưới 80% — cán bộ này đạt tốt ✅</td></tr>`;

    cardZone.innerHTML = `
      <div class="glass-card">
        <div class="card-head">
          <div class="avatar" id="avatarBox">${initials(name)}</div>
          <div class="id-block">
            <p class="id-name">${escapeHtml(name)}</p>
            <div class="id-role">
              <span class="tag">🏢 ${escapeHtml(d.phong)}</span>
              <span class="tag">💼 ${escapeHtml(d.cong_viec)}</span>
              <span class="tag">📋 ${lowRatioOnly ? displayKpis.length + '/' + d.kpis.length : d.kpis.length} chỉ tiêu</span>
            </div>
          </div>
          <div class="score-chip">
            <div class="val" style="color:#4da3ff">${overallDisplay}</div>
            <div class="lbl">TỔNG ĐIỂM KPI</div>
          </div>
        </div>
        <div class="card-body">
          <div class="table-controls">
            <button class="collapse-toggle-btn" id="collapseBtn" title="Thu gọn/Mở rộng bảng">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
              <span>Thu gọn</span>
            </button>
          </div>
          <div class="kpi-table-wrap" id="kpiTableWrap">
            <table class="kpi-table">
              <thead>
                <tr>
                  <th>Chỉ tiêu KPI</th>
                  <th class="num">Trọng số</th>
                  <th class="num">Kế hoạch</th>
                  <th class="num">Thực hiện</th>
                  <th class="num">Tỷ lệ HT</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
        <div class="card-foot">
          <span>Tổng trọng số: ${fmtNum(d.tong_trong_so)}</span>
          <span>${overallIsFromRow ? 'Điểm bình quân = giá trị Thực hiện của dòng "Điểm KPI"' : 'Điểm bình quân gia quyền = Σ(trọng số × tỷ lệ) / Σ(trọng số)'}</span>
        </div>
      </div>
    `;
    loadAvatarPhoto(name);
    
    // Setup collapse button
    const collapseBtn = document.getElementById('collapseBtn');
    const kpiTableWrap = document.getElementById('kpiTableWrap');
    if(collapseBtn && kpiTableWrap){
      collapseBtn.addEventListener('click', function(){
        kpiTableWrap.classList.toggle('collapsed');
        collapseBtn.classList.toggle('collapsed');
        const isCollapsed = kpiTableWrap.classList.contains('collapsed');
        collapseBtn.querySelector('span').textContent = isCollapsed ? 'Mở rộng' : 'Thu gọn';
      });
    }
  }

  // Thử nạp ảnh thật avatars/<Tên cán bộ>.jpg (hoặc .jpeg/.png).
  // Nếu không tìm thấy file nào, giữ nguyên icon chữ cái đã render sẵn.
  function loadAvatarPhoto(name){
    const box = document.getElementById('avatarBox');
    if(!box) return;
    const candidates = [
      `avatars/${name}.jpg`,
      `avatars/${name}.jpeg`,
      `avatars/${name}.png`
    ];
    tryNext(0);
    function tryNext(i){
      if(i >= candidates.length) return; // hết lựa chọn -> giữ icon chữ cái
      const img = new Image();
      img.onload = () => { box.innerHTML = ''; box.appendChild(img); };
      img.onerror = () => tryNext(i+1);
      img.src = candidates[i];
      img.alt = name;
    }
  }
</script>
